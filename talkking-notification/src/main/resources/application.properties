# ===================================================================
# 🌐 1. Server Configuration (서버 포트 격리)
# ===================================================================
# 채팅 서버(8081)와 포트 충돌을 피하기 위해 알림 서버는 8082로 구동합니다.
server.port=8082

# ===================================================================
# 🍃 2. Spring Application Name
# ===================================================================
spring.application.name=talkking-notification

# ===================================================================
# 🐇 3. RabbitMQ Configuration (메시지 브로커 커넥션)
# ===================================================================
# 로컬 또는 도커에서 돌아가는 RabbitMQ 서버 정보를 입력합니다.
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# 🎯 [중요] 외부에서 던져진 JSON 문자열 데이터를 자바 DTO 객체(ChatMessageDto)로 
# 문제없이 자동 변환(역직렬화)할 수 있도록 Jackson 메시지 컨버터를 연동하는 설정입니다.
spring.mvc.converters.preferred-json-mapper=jackson

# ===================================================================
# 🪵 4. Logging Configuration (콘솔 디버깅용)
# ===================================================================
# 실시간으로 RabbitMQ 큐에서 알림 신호가 넘어오는지 콘솔에서 똑똑히 감시하기 위한 로그 레벨 셋팅입니다.
logging.level.root=INFO
logging.level.com.team2.talkking=DEBUG