<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>TalkKing - 메인 대시보드</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .dashboard { width: 950px; background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); display: flex; height: 85vh; overflow: hidden; }
        
        /* 사이드바 (좌측 채팅방 목록) */
        .sidebar { width: 280px; border-right: 1px solid #e4e6eb; display: flex; flex-direction: column; background: #fafafa; }
        .sidebar-header { padding: 20px; border-bottom: 1px solid #e4e6eb; display: flex; flex-direction: column; gap: 10px; }
        .room-list { flex: 1; overflow-y: auto; padding: 10px; }
        .room-item { padding: 15px; border-radius: 8px; margin-bottom: 8px; background: white; border: 1px solid #e4e6eb; cursor: pointer; transition: 0.2s; }
        .room-item:hover { background: #e4e6eb; }
        
        /* 메인 작업 구역 분할 레이아웃 컨테이너 */
        .chat-main-body { flex: 1; display: flex; background: #f9f9f9; }
        
        /* 중앙 실시간 채팅 영역 */
        .chat-content { flex: 1; display: flex; flex-direction: column; border-right: 1px solid #e4e6eb; }
        .chat-header { padding: 15px 20px; background: white; border-bottom: 1px solid #e4e6eb; font-weight: bold; font-size: 16px; display: flex; align-items: center; justify-content: space-between; }
        .message-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; }
        
        /* 우측 참여자 명단 대시보드 사이드바 */
        .participant-sidebar { width: 180px; background: white; display: flex; flex-direction: column; padding: 15px; }
        .participant-title { font-size: 13px; font-weight: bold; color: #666; margin-bottom: 12px; border-bottom: 1px solid #eee; padding-bottom: 6px; }
        .participant-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        .participant-item { font-size: 13px; color: #333; display: flex; align-items: center; gap: 6px; padding: 4px; }
        
        /* 말풍선 스타일 */
        .msg { max-width: 65%; padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.4; word-break: break-all; }
        .msg.me { background: #0084ff; color: white; border-bottom-right-radius: 2px; }
        .msg.other { background: #e4e6eb; color: #333; border-bottom-left-radius: 2px; }
        .msg-sender { font-size: 11px; color: #777; margin-bottom: 2px; }
        
        /* 입력창 영역 */
        .input-area { padding: 15px; background: white; border-top: 1px solid #e4e6eb; display: flex; gap: 10px; }
        .input-area input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
        
        .btn { padding: 8px 12px; background: #0084ff; border: none; color: white; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn:hover { background: #006dd3; }
        .btn-success { background: #28a745; }
        .btn-success:hover { background: #218838; }
        .btn-danger { background: #dc3545; }
        .btn-danger:hover { background: #bd2130; }
        .btn-secondary { background: #e4e6eb; color: #333; }
        .btn-secondary:hover { background: #d8dadf; }
        
        /* 🔔 실시간 알림 토스트 상자 최상위 컨테이너 위치 고정 (우측 하단으로 변경) */
		#toast-container {
		    position: fixed !important;
		    bottom: 30px !important; /* 👈 top에서 bottom으로 변경 */
		    right: 30px !important;
		    z-index: 99999999 !important;
		    display: flex !important;
		    flex-direction: column !important;
		    gap: 12px;
		    pointer-events: none !important;
		}
		
		.toast-notification {
		    pointer-events: auto;
		    background: #222222 !important;
		    color: #ffffff !important;
		    padding: 16px 24px !important;
		    border-radius: 8px !important;
		    box-shadow: 0 8px 24px rgba(0,0,0,0.25) !important;
		    font-size: 14px !important;
		    min-width: 280px !important;
		    max-width: 350px !important;
		    display: flex !important;
		    align-items: flex-start !important;
		    gap: 12px !important;
		    border-left: 4px solid #0084ff !important;
		    opacity: 0;
		    transform: translateY(30px); /* 👈 -30px에서 30px로 변경 (아래에서 위로 등장) */
		    animation: toastSlideIn 0.3s ease-out forwards;
		}
		
		@keyframes toastSlideIn {
		    from { opacity: 0; transform: translateY(30px); } /* 👈 30px로 변경 */
		    to { opacity: 1; transform: translateY(0); }
		}

        /* 팝업 모달 */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 999; }
        .modal-content { background: white; padding: 25px; border-radius: 12px; width: 400px; max-height: 80vh; display: flex; flex-direction: column; }
        .modal-header { font-size: 18px; font-weight: bold; margin-bottom: 15px; }
        .search-box { display: flex; gap: 8px; margin-bottom: 15px; }
        .search-box input, .modal-content .room-title-input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 6px; }
        .search-results { flex: 1; overflow-y: auto; margin-bottom: 15px; max-height: 200px; border: 1px solid #eee; border-radius: 6px; padding: 5px; }
        .search-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #f5f5f5; align-items: center; }
        .modal-footer { display: flex; justify-content: flex-end; gap: 10px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="sidebar">
        <div class="sidebar-header">
            <div style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
                <h3 style="margin: 0;">채팅방 목록</h3>
                <button class="btn btn-secondary" onclick="logout()" style="font-size: 11px; padding: 4px 8px;">로그아웃</button>
            </div>
            <button class="btn" onclick="openCreateModal()" style="width: 100%;">방 만들기</button>
        </div>
        <div class="room-list" id="room-list">
            <p style="text-align: center; color: #aaa; margin-top: 20px;">참여 중인 방이 없습니다.</p>
        </div>
    </div>
    
    <div class="chat-main-body" id="chat-main-body">
        <div style="flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; color: #888;">
            <h3>💬 TalkKing Messenger</h3>
            <p>왼쪽에서 대화방을 선택하거나 새 방을 개설해 보세요!</p>
        </div>
    </div>
</div>

<div class="modal" id="user-action-modal">
    <div class="modal-content">
        <div class="modal-header" id="modal-title">새 그룹 채팅방 개설</div>
        <input type="text" id="new-room-title" class="room-title-input" placeholder="채팅방 이름을 입력하세요" style="margin-bottom: 15px; width: 94%;">
        <div class="search-box">
            <input type="text" id="user-search-keyword" placeholder="아이디 또는 닉네임 검색">
            <button class="btn" onclick="searchUsers()">검색</button>
        </div>
        <div class="search-results" id="search-results">
            <p style="text-align: center; color: #aaa; margin-top: 20px;">검색어를 입력해 주세요.</p>
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary" onclick="closeModal()">취소</button>
            <button class="btn" id="modal-submit-btn" onclick="submitModalAction()">확인</button>
        </div>
    </div>
</div>

<script>
const token = localStorage.getItem('accessToken');
if (!token) {
    alert('로그인이 필요한 서비스입니다.');
    location.href = '/login.html';
}

let stompClient = null;
let currentRoomId = null;
let myRealUserId = null; 
let modalMode = "CREATE"; 
let unreadCounts = {}; 
let activeSubscriptions = {}; 

// 1. JWT 토큰 해독 및 유저 ID 추출
try {
    const base64Url = token.split('.')[1];
    const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
    const payload = JSON.parse(window.atob(base64));
    myRealUserId = payload.userId || payload.id || payload.sub || payload.username;
    console.log("🔓 내 로그인 ID 확인 완료:", myRealUserId);
} catch (e) { console.error("토큰 해독 실패:", e); }

// 2. DOM이 로드되면 안전한 순차 타임라인을 가동합니다.
document.addEventListener("DOMContentLoaded", () => {
    console.log("🚀 [초기화 엔진] 시스템 기동 완료. 최초 방 목록 동기화를 시작합니다.");
    
    loadMyChatRooms().then(() => {
        setTimeout(() => {
            console.log("🤖 [폴링 엔진 활성화] 소켓 안테나가 안정화되었으므로 4초 주기 백그라운드 감시를 시작합니다.");
            
            setInterval(async () => {
                try {
                    if (stompClient === null || !stompClient.connected) return;

                    const response = await fetch('/api/chat/rooms', {
                        method: 'GET',
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    const rooms = await response.json();
                    
                    rooms.forEach(room => {
                        if (!activeSubscriptions[room.roomId]) {
                            console.log(`📢 [실시간 폴링 감지] #${room.roomId}번 방 신규 초대 포착! 안테나 가동!`);
                            subscribeToRoom(room.roomId);
                            loadMyChatRooms(); 
                        }
                    });
                } catch (e) { console.error("백그라운드 방 동기화 에러:", e); }
            }, 4000);
            
        }, 3000); 
    });
});

/**
 * 🌐 분산 서버 소켓 커넥션 통합 관리 핸들러 (완벽 분리 독립 가동 완성본)
 */
function connectWebSocket(roomList) {
    const rooms = roomList || [];

    // ==========================================
    // 💬 1. 채팅 전용 웹소켓 연결 (포트 8080 독립 구역)
    // ==========================================
    function connectChatServer() {
        const chatSocket = new SockJS('http://localhost:8080/ws'); 
        stompClient = Stomp.over(chatSocket);
        stompClient.debug = null; 

        stompClient.connect({}, function (frame) {
            console.log('채팅 서버(8080) 연결 성공 및 방 감시 시작 🚀');
            rooms.forEach(room => { subscribeToRoom(room.roomId); });
        }, function (error) {
            console.warn("⚠️ 채팅 소켓(8080) 연결 실패. 5초 후 채팅망만 단독 재연결을 시도합니다.");
            setTimeout(connectChatServer, 5000);
        });
    }

    // 8080 채팅 연결 엔진 가동
    connectChatServer();

    // ==========================================
    // 🔔 2. 알림 전용 웹소켓 연결 (포트 8082 독립 격리 구역)
    // ==========================================
    if (!myRealUserId || myRealUserId === "undefined") {
        try {
            const base64Url = token.split('.')[1];
            const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            const payload = JSON.parse(window.atob(base64));
            myRealUserId = payload.userId || payload.id || payload.sub || payload.username;
        } catch(e) { console.error("토큰 파싱 실패:", e); }
    }

    if (!myRealUserId || myRealUserId === "undefined") {
        console.error("❌ [치명적] 유저 ID(myRealUserId)를 찾지 못해 알림 구독을 진행할 수 없습니다.");
        return;
    }

    const notifSocket = new SockJS('http://localhost:8082/ws-notif');
    const notifClient = Stomp.over(notifSocket);

    notifClient.debug = function(str) {
        console.log("📢 [8082 소켓 신호 추적]:", str);
    };

    notifClient.connect({}, function (frame) {
        console.log(`%c🔔 알림 서버(8082) 연결 완벽 성공! 주파수 유지 주소: /topic/user.${myRealUserId}`, "color: #28a745; font-weight: bold;");
        
        notifClient.subscribe(`/topic/user.${myRealUserId}`, function (response) {
            console.log("🔔 [8082 알림 서버 신호 포착]:", response.body);
            
            try {
                const noticeData = JSON.parse(response.body);
                if (!noticeData) return;

                const dataObj = noticeData.payload || noticeData;
                console.log("📦 [알맹이 데이터 검증]:", dataObj);

                const roomId = dataObj.roomId || dataObj.id || "";
                const msgType = dataObj.type || "";

                // 🚨 [중복 차단 핵심 필터] 일반 TALK 메시지이면서 이미 목록에 있는 방은 8080에서 처리하므로 8082 팝업 생략
                if (msgType === "TALK" && document.getElementById(`room-item-${roomId}`)) {
                    console.log(`⏭️ [#${roomId}번 방] 일반 채팅 알림은 8080 채널에서 처리하므로, 8082 채널은 팝업을 생략합니다.`);
                    if (typeof loadMyChatRooms === 'function') loadMyChatRooms();
                    if (roomId && typeof subscribeToRoom === 'function') subscribeToRoom(roomId);
                    return; 
                }

                // 2. 메시지 본문 및 보낸 사람 추출 (순수 초대나 시스템 알림 등만 진입)
                const chatMessage = dataObj.message || dataObj.content || "새로운 알림이 도착했습니다.";
                const senderName = dataObj.senderNickname || dataObj.senderName || "시스템";

                // 내 좌측 목록에서 진짜 방 이름 찾기
                let roomTitle = "";
                if (roomId) {
                    const roomItemEl = document.getElementById(`room-item-${roomId}`);
                    if (roomItemEl) {
                        const titleEl = roomItemEl.querySelector('div[style*="font-weight: bold"]');
                        if (titleEl) roomTitle = titleEl.innerText.replace("💬", "").trim();
                    }
                }
                if (!roomTitle) roomTitle = dataObj.roomTitle || "새로운 방";

                const roomInfo = roomTitle ? `[${roomTitle}] ` : "";
                const senderId = dataObj.sender || dataObj.senderId || null;

                // 내가 발생시킨 이벤트면 차단
                if (senderId && myRealUserId && String(myRealUserId) === String(senderId)) {
                    console.log("📦 내가 발생시킨 초대/채팅 이벤트이므로 토스트를 띄우지 않습니다.");
                    return;
                }

                // 신규 초대방 인프라 동기화 가동
                if (typeof loadMyChatRooms === 'function') loadMyChatRooms();
                if (roomId && typeof subscribeToRoom === 'function') subscribeToRoom(roomId);

                // 🔥 순수 외부 알림/초대장 팝업 조립 및 출력
                const finalToastMessage = `${roomInfo}${senderName}: ${chatMessage}`;
                console.log("🚀 [팝업 구동 부스터] 8082 순수 알림 가공 완료 ->", finalToastMessage);
                
                showNotificationToast(finalToastMessage);

            } catch (parsingError) {
                console.error("❌ 알림 수신 로직 내부 스크립트 치명적 에러 발생:", parsingError);
            }
        });
        
    }, function (error) { 
        console.error("❌ 8082 알림 소켓 자체 연결 끊김 발생:", error);
    });
} 

/**
 * 📡 채팅방 실시간 대화 안테나 가동 핸들러 (일반 채팅 + 입퇴장 중복 알림 완벽 차단 버전)
 */
function subscribeToRoom(roomId) {
    if (activeSubscriptions[roomId]) return;

    activeSubscriptions[roomId] = stompClient.subscribe(`/sub/chat/room/${roomId}`, function (response) {
        const messageBody = JSON.parse(response.body);
        
        let isMessageFromMe = false;
        if (myRealUserId && messageBody.sender) {
            if (String(myRealUserId) === String(messageBody.sender)) {
                isMessageFromMe = true;
            }
        }

        // ============================================================
        // 🎯 [시나리오 A] 내가 현재 '이 채팅방을 열어서 보고 있는 상태'일 때
        // ============================================================
        if (Number(currentRoomId) === Number(roomId)) {
            displayMessage(messageBody);
            
            // 🚪 케이스 1: 입장/퇴장 메시지인 경우 -> 방 안에 있으므로 토스트 차단
            if (messageBody.type === "ENTER" || messageBody.type === "QUIT") {
                console.log("⏭️ 현재 열려있는 방의 입퇴장이므로 토스트를 건너뜁니다.");
                
                // 참여자 명단 대시보드 리프레시
                fetch(`/api/chat/rooms/${roomId}/users`, {
                    method: 'GET',
                    headers: { 'Authorization': `Bearer ${token}` }
                })
                .then(res => res.json())
                .then(participants => {
                    const pListDiv = document.getElementById('participant-list');
                    if (pListDiv) {
                        pListDiv.innerHTML = ''; 
                        participants.forEach(p => {
                            const pItem = document.createElement('div');
                            pItem.className = 'participant-item';
                            const isMeMark = (String(myRealUserId) === String(p.userId)) ? ' <span style="font-size:10px; color:#0084ff; font-weight:bold;">(나)</span>' : '';
                            pItem.innerHTML = `👤 <strong>${p.nickname}</strong>${isMeMark}`;
                            pListDiv.appendChild(pItem);
                        });
                    }
                }).catch(e => console.error(e));
            }
            // 💬 케이스 2: 일반 대화(TALK) 메시지인 경우 -> 팝업 생략
            else {
                console.log("⏭️ 현재 보고 있는 채팅방의 실시간 대화이므로 알림 팝업을 생략합니다.");
            }

            // 읽음 처리 API 호출
            fetch(`/api/chat/rooms/${roomId}/read`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}` }
            }).catch(e => console.error(e));
        }
        // ============================================================
        // 🎯 [시나리오 B] 내가 다른 방을 보고 있거나 로비에 있을 때 (백그라운드 알림)
        // ============================================================
        else {
            if (!isMessageFromMe) {
                const senderName = messageBody.senderNickname || `유저(${messageBody.sender})`;
                const chatMessage = messageBody.message || messageBody.content || "";
                
                let roomTitle = "";
                const roomItemEl = document.getElementById(`room-item-${roomId}`);
                if (roomItemEl) {
                    const titleEl = roomItemEl.querySelector('div[style*="font-weight: bold"]');
                    if (titleEl) roomTitle = titleEl.innerText.replace("💬", "").trim();
                }
                if (!roomTitle) roomTitle = `${roomId}번 방`;

                // 🔔 카카오톡 스타일 전송 ([2팀] 김사원: 안녕하세요)
                showNotificationToast(`[${roomTitle}] ${senderName}: ${chatMessage}`);
            }
        }
        
        // 배지 카운트 제어
        if (!isMessageFromMe) {
            if (Number(currentRoomId) === Number(roomId)) {
                unreadCounts[roomId] = 0;
            } else {
                unreadCounts[roomId] = (unreadCounts[roomId] || 0) + 1; 
            }
            updateBadgeUI(roomId);
        } else {
            unreadCounts[roomId] = 0;
            updateBadgeUI(roomId);
        }
        
        const lastMsgTarget = document.getElementById(`last-msg-${roomId}`);
        if (lastMsgTarget) {
            lastMsgTarget.innerText = messageBody.message || messageBody.content || "";
        }
    });
}
    
/**
 * 🔄 [실시간 렌더링 보정] 내 채팅방 목록 로드 및 화면 즉시 갱신 함수
 */
async function loadMyChatRooms() {
    try {
        console.log("🔄 [목록 동기화] 서버로부터 최신 채팅방 목록을 가져옵니다...");
        
        const response = await fetch('/api/chat/rooms', {
            method: 'GET',
            headers: { 'Authorization': `Bearer ${token}` }
        });
        const rooms = await response.json();

        const roomListDiv = document.getElementById('room-list');
        if (!roomListDiv) return;
        
        roomListDiv.innerHTML = ''; 
        
        if (!rooms || rooms.length === 0) {
            roomListDiv.innerHTML = '<p style="text-align: center; color: #aaa; margin-top: 20px;">참여 중인 방이 없습니다.</p>';
            return;
        }
        
        rooms.forEach(room => {
            const roomItem = document.createElement('div');
            roomItem.className = 'room-item';
            roomItem.id = `room-item-${room.roomId}`;
            roomItem.onclick = () => selectChatRoom(room.roomId, room.title); 
            
            unreadCounts[room.roomId] = room.unreadCount || 0;
            
            roomItem.innerHTML = `
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <div style="font-weight: bold; color: #333;">💬 ${room.title}</div>
                    <div class="badge-el" id="badge-${room.roomId}" style="display: none; background: #ff3b30; color: white; border-radius: 10px; padding: 2px 8px; font-size: 11px; font-weight: bold;">0</div>
                </div>
                <div class="last-msg-text" id="last-msg-${room.roomId}" style="font-size: 13px; color: #777; margin-top: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">
                    ${room.lastMessage || '아직 대화가 없습니다.'}
                </div>
            `;
            roomListDiv.appendChild(roomItem);
            updateBadgeUI(room.roomId);

            if (stompClient !== null && stompClient.connected) {
                subscribeToRoom(room.roomId);
            }
        });

        if (stompClient === null) { 
            connectWebSocket(rooms); 
        }
        
        console.log("✅ [렌더링 완료] 실시간 방 목록이 화면에 정상 동기화되었습니다.");
    } catch (error) { 
        console.error('방 목록 로드 실패:', error); 
    }
}

function updateBadgeUI(roomId) {
    const badgeTarget = document.getElementById(`badge-${roomId}`);
    if (!badgeTarget) return;
    const count = unreadCounts[roomId] || 0;
    if (count > 0) {
        badgeTarget.innerText = count;
        badgeTarget.style.display = "block"; 
    } else { badgeTarget.style.display = "none"; }
}

async function selectChatRoom(roomId, title) {
    currentRoomId = roomId;
    try {
        await fetch(`/api/chat/rooms/${roomId}/read`, {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${token}` }
        });
    } catch (e) {}

    unreadCounts[roomId] = 0;
    updateBadgeUI(roomId);

    const mainBody = document.getElementById('chat-main-body');
    mainBody.innerHTML = `
        <div class="chat-content">
            <div class="chat-header">
                <div>
                    <span>💬 ${title}</span>
                    <span style="font-size: 12px; color: #999; margin-left: 8px;">방 번호: #${roomId}</span>
                </div>
                <div style="display: flex; gap: 6px;">
                    <button class="btn btn-success" onclick="openInviteModal()">+ 친구 초대</button>
                    <button class="btn btn-danger" onclick="exitChatRoom(${roomId})">방 나가기</button>
                </div>
            </div>
            <div class="message-area" id="message-area"></div>
            <div class="input-area">
                <input type="text" id="message-input" placeholder="메시지를 입력하세요..." onkeydown="if(event.keyCode==13) sendMessage()">
                <button class="btn" onclick="sendMessage()">전송</button>
            </div>
        </div>
        <div class="participant-sidebar">
            <div class="participant-title">대화 상대방</div>
            <div class="participant-list" id="participant-list">
                <p style="font-size:11px; color:#aaa;">상대방 갱신 중...</p>
            </div>
        </div>
    `;

    try {
        const response = await fetch(`/api/chat/rooms/${roomId}/history-list`, {
            method: 'GET',
            headers: { 'Authorization': `Bearer ${token}` }
        });
        const histories = await response.json();
        histories.forEach(hist => {
            displayMessage({
                sender: String(hist.senderId),
                senderNickname: hist.senderNickname,
                message: hist.message,
                type: hist.type 
            });
        });
    } catch (error) { console.error("이력 로드 실패:", error); }

    try {
        const response = await fetch(`/api/chat/rooms/${roomId}/users`, {
            method: 'GET',
            headers: { 'Authorization': `Bearer ${token}` }
        });
        const participants = await response.json();
        const pListDiv = document.getElementById('participant-list');
        pListDiv.innerHTML = ''; 
        participants.forEach(p => {
            const pItem = document.createElement('div');
            pItem.className = 'participant-item';
            const isMeMark = (String(myRealUserId) === String(p.userId)) ? ' <span style="font-size:10px; color:#0084ff; font-weight:bold;">(나)</span>' : '';
            pItem.innerHTML = `👤 <strong>${p.nickname}</strong>${isMeMark}`;
            pListDiv.appendChild(pItem);
        });
    } catch (error) { console.error(error); }
}

async function exitChatRoom(roomId) {
    if (!confirm("정말 이 채팅방을 나가시겠습니까?\n나간 방의 대화 이력은 모두 삭제됩니다.")) return;
    try {
        const response = await fetch(`/api/chat/rooms/${roomId}/exit`, {
            method: 'DELETE',
            headers: { 'Authorization': `Bearer ${token}` }
        });
        if (response.ok) {
            alert("채팅방을 정상적으로 나갔습니다.");
            if (activeSubscriptions[roomId]) {
                activeSubscriptions[roomId].unsubscribe();
                delete activeSubscriptions[roomId];
            }
            currentRoomId = null;
            document.getElementById('chat-main-body').innerHTML = `
                <div style="flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; color: #888;">
                    <h3>💬 TalkKing Messenger</h3>
                    <p>왼쪽에서 대화방을 선택하거나 새 방을 개설해 보세요!</p>
                </div>
            `;
            loadMyChatRooms(); 
        } else { alert("방 나가기에 실패했습니다."); }
    } catch (e) { alert("오류 발생: " + e.message); }
}

function logout() {
    if (!confirm("로그아웃 하시겠습니까?")) return;
    localStorage.removeItem('accessToken'); 
    alert("로그아웃 되었습니다. 로그인 페이지로 이동합니다.");
    location.href = '/login.html'; 
}

function sendMessage() {
    const input = document.getElementById('message-input');
    const content = input.value.trim();
    if (!content || !currentRoomId) return;

    const chatMessage = {
        type: "TALK",
        roomId: String(currentRoomId),
        message: content,
        sender: String(myRealUserId) 
    };
    stompClient.send("/pub/chat/message", {}, JSON.stringify(chatMessage));
    input.value = ''; 
}

function displayMessage(message) {
    const messageArea = document.getElementById('message-area');
    if (!messageArea) return;

    const msgWrapper = document.createElement('div');
    msgWrapper.style.display = 'flex';
    msgWrapper.style.flexDirection = 'column';
    msgWrapper.style.marginBottom = '10px';
    const textContent = message.message || message.content || ""; 

    if (message.type === "ENTER" || message.type === "QUIT") {
        const systemNoticeDiv = document.createElement('div');
        systemNoticeDiv.style.alignSelf = 'center'; 
        systemNoticeDiv.style.background = 'rgba(0, 0, 0, 0.05)'; 
        systemNoticeDiv.style.color = '#666'; 
        systemNoticeDiv.style.padding = '6px 16px';
        systemNoticeDiv.style.borderRadius = '20px';
        systemNoticeDiv.style.fontSize = '12px';
        systemNoticeDiv.innerText = `📢 ${textContent}`;
        msgWrapper.appendChild(systemNoticeDiv);
        messageArea.appendChild(msgWrapper);
        messageArea.scrollTop = messageArea.scrollHeight; 
        return;
    }

    const msgDiv = document.createElement('div');
    const displayName = message.senderNickname || `유저(${message.sender})`;

    let isMe = false;
    if (myRealUserId && message.sender) {
        if (String(myRealUserId) === String(message.sender)) isMe = true;
    }

    if (isMe) {
        msgWrapper.style.alignItems = 'flex-end'; 
        msgDiv.className = 'msg me';
        msgDiv.innerText = textContent; 
    } else {
        msgWrapper.style.alignItems = 'flex-start'; 
        msgDiv.className = 'msg other';
        msgDiv.innerHTML = `
            <div class="msg-sender" style="font-weight: bold; margin-bottom: 3px; color: #555;">👤 ${displayName}</div>
            <div>${textContent}</div>
        `;
    }

    msgWrapper.appendChild(msgDiv);
    messageArea.appendChild(msgWrapper);
    messageArea.scrollTop = messageArea.scrollHeight; 
}

function openCreateModal() {
    modalMode = "CREATE";
    document.getElementById('modal-title').innerText = "새 그룹 채팅방 개설";
    document.getElementById('new-room-title').style.display = "block";
    document.getElementById('modal-submit-btn').innerText = "방 생성 및 초대";
    document.getElementById('user-action-modal').style.display = 'flex';
}
function openInviteModal() {
    modalMode = "INVITE";
    document.getElementById('modal-title').innerText = "현재 방에 새 멤버 초대하기";
    document.getElementById('new-room-title').style.display = "none";
    document.getElementById('modal-submit-btn').innerText = "현재 방에 추가 초대";
    document.getElementById('user-action-modal').style.display = 'flex';
}
function closeModal() { 
    document.getElementById('user-action-modal').style.display = 'none'; 
    document.getElementById('search-results').innerHTML = '<p style="text-align: center; color: #aaa; margin-top: 20px;">검색어를 입력해 주세요.</p>';
    document.getElementById('new-room-title').value = '';
    document.getElementById('user-search-keyword').value = '';
}
async function searchUsers() {
    const keyword = document.getElementById('user-search-keyword').value;
    if (!keyword) return alert('검색어를 입력하세요.');
    try {
        const response = await fetch(`/api/chat/rooms/search?keyword=${encodeURIComponent(keyword)}`, {
            method: 'GET',
            headers: { 'Authorization': `Bearer ${token}` }
        });
        const users = await response.json();
        const resultBox = document.getElementById('search-results');
        resultBox.innerHTML = '';
        if (users.length === 0) {
            resultBox.innerHTML = '<p style="text-align: center; color: #aaa; margin-top: 20px;">검색 결과가 없습니다.</p>';
            return;
        }
        users.forEach(user => {
            const item = document.createElement('div');
            item.className = 'search-item';
            item.innerHTML = `<div><strong>${user.nickname}</strong> <span style="font-size: 12px; color: #888;">(@${user.username})</span></div><input type="checkbox" value="${user.userId}" class="user-checkbox">`;
            resultBox.appendChild(item);
        });
    } catch (error) { alert('유저 검색 에러: ' + error.message); }
}
function submitModalAction() {
    if (modalMode === "CREATE") createGroupRoom();
    else if (modalMode === "INVITE") inviteGroupMembers();
}
async function createGroupRoom() {
    const roomTitle = document.getElementById('new-room-title').value;
    if (!roomTitle) return alert('채팅방 이름을 입력하세요.');
    const checkboxes = document.querySelectorAll('.user-checkbox:checked');
    const invitedUserIds = Array.from(checkboxes).map(cb => parseInt(cb.value));
    if (invitedUserIds.length === 0) return alert('최소 한 명 이상의 유저를 선택해야 단톡방 생성이 가능합니다.');
    try {
        const response = await fetch('/api/chat/rooms', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
            body: JSON.stringify({ roomTitle, invitedUserIds })
        });
        if (response.ok) {
            alert(`방 생성 성공!`);
            closeModal();
            loadMyChatRooms();
        }
    } catch (error) { alert('방 생성 오류: ' + error.message); }
}

async function inviteGroupMembers() {
    const checkboxes = document.querySelectorAll('.user-checkbox:checked');
    const invitedUserIds = Array.from(checkboxes).map(cb => parseInt(cb.value));
    if (invitedUserIds.length === 0) return alert('추가로 초대할 유저를 선택해 주세요.');
    try {
        const response = await fetch(`/api/chat/rooms/${currentRoomId}/invite`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
            body: JSON.stringify({ invitedUserIds })
        });
        if (response.ok) {
            alert("선택한 유저가 방에 정상 초대되었습니다!");
            closeModal();
            
            fetch(`/api/chat/rooms/${currentRoomId}/users`, {
                method: 'GET',
                headers: { 'Authorization': `Bearer ${token}` }
            })
            .then(res => res.json())
            .then(participants => {
                const pListDiv = document.getElementById('participant-list');
                if (pListDiv) {
                    pListDiv.innerHTML = ''; 
                    participants.forEach(p => {
                        const pItem = document.createElement('div');
                        pItem.className = 'participant-item';
                        const isMeMark = (String(myRealUserId) === String(p.userId)) ? ' <span style="font-size:10px; color:#0084ff; font-weight:bold;">(나)</span>' : '';
                        pItem.innerHTML = `👤 <strong>${p.nickname}</strong>${isMeMark}`;
                        pListDiv.appendChild(pItem);
                    });
                }
            }).catch(e => console.error(e));
        } else { alert("초대에 실패했습니다."); }
    } catch (error) { alert('초대 오류: ' + error.message); }
}

/**
 * 🔔 화면 우측 상단에 카카오톡 스타일 토스트 알림을 레이아웃 씹힘 없이 동적 생성하는 함수
 */
function showNotificationToast(message) {
    console.log("📢 [토스트 엔진 가동]: 화면에 팝업을 그리기 시작합니다 ->", message);

    let container = document.getElementById('toast-container');
    if (!container) {
        container = document.createElement('div');
        container.id = 'toast-container';
        document.body.appendChild(container);
    }

    const toast = document.createElement('div');
    toast.className = 'toast-notification';
    
    toast.innerHTML = `
        <span style="font-size: 18px;">🔔</span>
        <div style="flex: 1;">
            <div style="font-weight: bold; margin-bottom: 3px; color: #0084ff;">TalkKing 알림</div>
            <div style="color: #eee; line-height: 1.4; word-break: break-all;">${message}</div>
        </div>
    `;

    container.appendChild(toast);

    // 4초 후 우측 상단에서 부드럽게 위로 소멸되도록 애니메이션 매핑 싱크 보정
    setTimeout(() => {
        toast.style.transition = 'all 0.4s ease-in-out';
        toast.style.opacity = '0';
        toast.style.transform = 'translateY(-20px)'; /* 👈 자연스럽게 위로 올라가며 사라지도록 설정 */
        
        setTimeout(() => {
            if (toast.parentNode) {
                container.removeChild(toast);
            }
        }, 400);
    }, 4000);
}
</script>
