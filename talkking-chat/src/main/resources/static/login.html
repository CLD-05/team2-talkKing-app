<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>TalkKing - 로그인 및 회원가입</title>
    <style>
        body { 
            font-family: 'Malgun Gothic', Arial, sans-serif; 
            background: #F8F9FD; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .container { 
            background: white; 
            padding: 40px 35px; 
            border-radius: 16px; 
            box-shadow: 0 10px 30px rgba(95, 75, 139, 0.08); 
            width: 360px; 
            text-align: center;
        }
        .logo-area {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 30px;
        }
        .logo-icon {
            color: #5C4BEA; 
            font-size: 28px;
        }
        .logo-text {
            font-size: 26px;
            font-weight: bold;
            color: #5C4BEA;
            letter-spacing: -0.5px;
        }
        input { 
            width: 100%; 
            padding: 14px; 
            margin: 10px 0; 
            border: 1px solid #E2E8F0; 
            border-radius: 10px; 
            box-sizing: border-box; 
            font-size: 15px;
            background-color: #FAFAFA;
            transition: all 0.2s ease;
        }
        input:focus {
            outline: none;
            border-color: #5C4BEA;
            background-color: #FFF;
            box-shadow: 0 0 0 3px rgba(92, 75, 234, 0.1);
        }
        button { 
            width: 100%; 
            padding: 14px; 
            background: #5C4BEA; 
            border: none; 
            color: white; 
            border-radius: 10px; 
            cursor: pointer; 
            font-size: 16px; 
            font-weight: bold;
            margin-top: 15px; 
            transition: background 0.2s ease;
            box-shadow: 0 4px 12px rgba(92, 75, 234, 0.2);
        }
        button:hover { 
            background: #4A3BC7; 
        }
        .switch { 
            text-align: center; 
            margin-top: 20px; 
            font-size: 14px; 
            color: #718096; 
            cursor: pointer; 
            text-decoration: none;
            transition: color 0.2s ease;
        }
        .switch:hover { 
            color: #5C4BEA;
            text-decoration: underline; 
        }
        .token-box { 
            margin-top: 20px; 
            padding: 10px; 
            background: #F7FAFC; 
            border-radius: 8px; 
            word-break: break-all; 
            font-size: 12px; 
            display: none; 
            color: #4A5568; 
        }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-area">
        <span class="logo-icon">💬</span>
        <span class="logo-text" id="form-title">talkking</span>
    </div>
    
    <input type="text" id="username" placeholder="아이디 (Username)">
    <input type="password" id="password" placeholder="비밀번호 (Password)">
    <input type="text" id="nickname" placeholder="닉네임 (회원가입 시에만 입력)" style="display: none;">
    
    <button id="submit-btn" onclick="handleSubmit()">로그인</button>
    <div class="switch" id="switch-mode" onclick="toggleMode()">아직 계정이 없으신가요? 회원가입하기</div>
    
    <div class="token-box" id="token-box"></div>
</div>

<script>
    let isSignUpMode = false;

    // 🧹 초기화 시 기존 토큰 잔재들 깔끔히 삭제
    localStorage.removeItem('accessToken');
    localStorage.removeItem('refreshToken');
    document.cookie = "accessToken=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;";
    document.cookie = "refreshToken=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;";

    function toggleMode() {
        isSignUpMode = !isSignUpMode;
        document.getElementById('form-title').innerText = isSignUpMode ? '회원가입' : 'talkking';
        document.getElementById('submit-btn').innerText = isSignUpMode ? '회원가입 완료' : '로그인';
        document.getElementById('switch-mode').innerText = isSignUpMode ? '이미 계정이 있나요? 로그인하기' : '아직 계정이 없으신가요? 회원가입하기';
        document.getElementById('nickname').style.display = isSignUpMode ? 'block' : 'none';
    }

    async function handleSubmit() {
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        const nickname = document.getElementById('nickname').value;

        if (!username || !password) {
            alert('아이디와 비밀번호를 입력해주세요.');
            return;
        }

        const url = isSignUpMode ? '/api/users/signup' : '/api/users/login';
        const bodyData = isSignUpMode ? { username, password, nickname } : { username, password };

        try {
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(bodyData)
            });

            if (!response.ok) {
                const errorText = await response.text();
                throw new Error(errorText || '요청 실패');
            }

            if (isSignUpMode) {
                alert('회원가입 성공! 로그인 모드로 전환합니다.');
                toggleMode();
            } else {
                const responseData = await response.json(); // 🎯 응답을 JSON 객체로 파싱
                
                // 🔄 백엔드가 주는 두 개의 토큰 파싱
                const accessToken = responseData.accessToken;
                const refreshToken = responseData.refreshToken;

                if (!accessToken || !refreshToken) {
                    throw new Error("서버로부터 정상적인 토큰 쌍을 받지 못했습니다.");
                }

                alert('로그인 성공! 메인 화면으로 이동합니다.');
                
                // 💾 1. Access Token 저장 (기존 스펙 보존 유지)
                localStorage.setItem('accessToken', accessToken);
                document.cookie = `accessToken=${accessToken}; path=/; max-age=1800;`; // 🕒 만료시간 30분(1800초)으로 매핑
                
                // 💾 2. 🔥 [추가] Refresh Token 쿠키 저장
                // (만약 백엔드에서 자체적으로 HttpOnly 쿠키를 심어주지 않는 아키텍처라면 JS에서 구워줍니다)
                document.cookie = `refreshToken=${refreshToken}; path=/; max-age=1209600;`; // 🕒 만료시간 14일(1209600초)로 매핑

                // 🎯 끄트머리 .html 없이 무조건 백엔드 루트 관문('/')으로 신호를 보냅니다.
                setTimeout(() => {
                    location.href = '/';
                }, 500);
            }
        } catch (error) {
            alert('에러 발생: ' + error.message);
        }
    }
</script>
</body>
</html>
