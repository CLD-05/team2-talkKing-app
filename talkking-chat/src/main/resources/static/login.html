<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>TalkKing - 로그인 및 회원가입</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f4; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 350px; }
        h2 { text-align: center; color: #333; }
        input { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #5bc0de; border: none; color: white; border-radius: 4px; cursor: pointer; font-size: 16px; margin-top: 10px; }
        button:hover { background: #46b8da; }
        .switch { text-align: center; margin-top: 15px; font-size: 14px; color: #666; cursor: pointer; text-decoration: underline; }
        .token-box { margin-top: 20px; padding: 10px; background: #eee; border-radius: 4px; word-break: break-all; font-size: 12px; display: none; color: #555; }
    </style>
</head>
<body>

<div class="container">
    <h2 id="form-title">TalkKing 로그인</h2>
    
    <input type="text" id="username" placeholder="아이디 (Username)">
    <input type="password" id="password" placeholder="비밀번호 (Password)">
    <input type="text" id="nickname" placeholder="닉네임 (회원가입 시에만 입력)" style="display: none;">
    
    <button id="submit-btn" onclick="handleSubmit()">로그인</button>
    <div class="switch" id="switch-mode" onclick="toggleMode()">아직 계정이 없으신가요? 회원가입하기</div>
    
    <div class="token-box" id="token-box"></div>
</div>

<script>
    let isSignUpMode = false;

    // LocalStorage 초기화 (테스트 진입 시 꼬임 방지)
    localStorage.removeItem('accessToken');

    function toggleMode() {
        isSignUpMode = !isSignUpMode;
        document.getElementById('form-title').innerText = isSignUpMode ? 'TalkKing 회원가입' : 'TalkKing 로그인';
        document.getElementById('submit-btn').innerText = isSignUpMode ? '회원가입 완료' : '로그인';
        document.getElementById('switch-mode').innerText = isSignUpMode ? '이미 계정이 있나요? 로그인하기' : '아직 계정이 없으신가요? 회원가입하기';
        document.getElementById('nickname').style.display = isSignUpMode ? 'block' : 'none';
    }

    async function handleSubmit() {
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        const nickname = document.getElementById('nickname').value;

        if (!username || !password) {
            alert('아이디와 비밀번호를 입력해주세요.');
            return;
        }

        const url = isSignUpMode ? '/api/users/signup' : '/api/users/login';
        const bodyData = isSignUpMode ? { username, password, nickname } : { username, password };

        try {
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(bodyData)
            });

            if (!response.ok) {
                const errorText = await response.text();
                throw new Error(errorText || '요청 실패');
            }

            if (isSignUpMode) {
                alert('회원가입 성공! 로그인 모드로 전환합니다.');
                toggleMode();
            } else {
                // 🎯 1. 우선 서버 응답을 텍스트로 먼저 받습니다.
                const responseText = await response.text();
                let tokenValue = "";

                try {
                    // 🎯 2. 만약 응답이 {"token":"ey..."} 구조의 JSON 형태라면 파싱해서 추출합니다.
                    const jsonData = JSON.parse(responseText);
                    tokenValue = jsonData.token || jsonData.accessToken || responseText;
                } catch (e) {
                    // 🎯 3. 만약 JSON이 아니라 순수 문자열 형태라면 그대로 토큰으로 취급합니다.
                    tokenValue = responseText;
                }

                // 공백이나 따옴표가 섞여 들어가는 현상 방지
                tokenValue = tokenValue.trim().replace(/^"|"$/g, '');

                alert('로그인 성공! 메인 화면으로 이동합니다.');
                
                // 🔥 [가장 중요] 브라우저 세션/로컬 스토리지에 확실하게 저장 도장 찍기
                localStorage.setItem('accessToken', tokenValue);
                
                // 디버깅용 화면 출력
                const tokenBox = document.getElementById('token-box');
                tokenBox.style.display = 'block';
                tokenBox.innerText = '🎟️ 발급된 JWT 토큰:\n' + tokenValue;

                // 0.5초 뒤 대시보드 화면으로 이동
                setTimeout(() => {
                    location.href = '/main.html';
                }, 500);
            }
        } catch (error) {
            alert('에러 발생: ' + error.message);
        }
    }
</script>
</body>
</html>
