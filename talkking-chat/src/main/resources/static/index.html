<!DOCTYPE html>
<html>
<head>
	<meta charset="UTF-8">
    <title>TalkKing 다중 파드 웹소켓 테스트</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.5.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
</head>
<body style="padding: 20px; font-family: sans-serif;">
    <h2>🚀 TalkKing 다중 파드 실시간 검증 툴</h2>
    <div style="margin-bottom: 10px;">
        <label>연결할 서버 포트: </label>
        <input type="text" id="port" value="8080" style="width: 60px; padding: 5px;">
        <button onclick="connect()" style="padding: 5px 10px;">🔌 연결하기</button>
    </div>
    <div style="margin-bottom: 15px;">
        <label>보낼 메시지: </label>
        <input type="text" id="message" value="안녕! 메시지 보낸다." style="width: 250px; padding: 5px;">
        <button onclick="sendMessage()" style="padding: 5px 10px;">📤 메시지 발송</button>
    </div>
    <h3>📥 수신된 메시지 콘솔</h3>
    <div id="log" style="border: 1px solid #ccc; padding: 10px; height: 250px; overflow-y: scroll; background: #f9f9f9; font-family: monospace;"></div>

    <script>
        var stompClient = null;

        function connect() {
            var port = document.getElementById('port').value;
            // 우리 앱의 WebSocketConfig 스펙인 /ws 엔드포인트 그대로 SockJS 연결 진행
            var socket = new SockJS('http://localhost:' + port + '/ws');
            stompClient = Stomp.over(socket);

            stompClient.connect({}, function (frame) {
                log("✅ 서버 (" + port + " 포트) 연결 성공!");
                // test-room 채널 구독
                stompClient.subscribe('/sub/chat/room/test-room', function (chatMessage) {
                    var body = JSON.parse(chatMessage.body);
                    log("📩 [수신] " + body.sender + ": " + body.message);
                });
            }, function(error) {
                log("❌ 연결 실패: " + error);
            });
        }

        function sendMessage() {
            var msgText = document.getElementById('message').value;
            var port = document.getElementById('port').value;
            if(stompClient) {
                var payload = {
                    type: "TALK",
                    roomId: "test-room",
                    sender: "유저_" + port,
                    message: msgText
                };
                stompClient.send("/pub/chat/message", {}, JSON.stringify(payload));
                log("🚀 [발송 완료] -> " + msgText);
            } else {
                alert("먼저 연결하기 버튼을 눌러주세요!");
            }
        }

        function log(msg) {
            var logDiv = document.getElementById('log');
            logDiv.innerHTML += msg + "<br/>";
            logDiv.scrollTop = logDiv.scrollHeight;
        }
    </script>
</body>
</html>
