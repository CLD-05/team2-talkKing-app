# ===================================================================
# 🌐 1. Server Configuration (채팅 서버 포트 고정)
# ===================================================================
# 알림 서버(8082)와 쫑나지 않도록 채팅 코어 서버는 8081 포트로 구동합니다.
server.port=8080

# ===================================================================
# 🍃 2. Spring Application Name
# ===================================================================
spring.application.name=talkking-chat

# ===================================================================
# 🐇 3. RabbitMQ Configuration (메시지 브로커 송신 설정)
# ===================================================================
# 도커 또는 로컬에 설치된 RabbitMQ 메인 브로커 정보와 동기화합니다.
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# 🎯 [중요] 채팅방 내부 대화 및 입장/퇴장 멘트 DTO(ChatMessageDto)를 
# RabbitMQ 큐로 쏠 때 이쁜 JSON 문자열로 자동 변환(직렬화)해 주는 핵심 셋팅입니다.
spring.mvc.converters.preferred-json-mapper=jackson

# ===================================================================
# 💾 4. Database & JPA Configuration (※ 기존 설정이 있다면 유지)
# ===================================================================
# 예시 규격이므로 유저님의 실제 DB 주소와 계정 정보에 맞게 맞춰주세요!
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/talkking?serverTimezone=Asia/Seoul
spring.datasource.username=root
spring.datasource.password=1234

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===================================================================
# 🪵 5. Logging Configuration
# ===================================================================
logging.level.root=INFO
logging.level.com.team2.talkking=DEBUG

spring.data.redis.host=redis-11426.c326.us-east-1-3.ec2.cloud.redislabs.com
spring.data.redis.port=11426
