spring:
  application:
    name: ai-error-analyzer
  data:  
    redis:
      host: ${REDIS_HOST:team2-talkking-dev-redis.9iaedf.ng.0001.apn2.cache.amazonaws.com}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
      jedis:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
          max-wait: -1ms
  datasource:
    url: ${ALERT_DATASOURCE_URL}           # 👈 실환경 변수만 깔끔하게 명시 (테라폼 rds 엔드포인트가 박힘)
    username: ${ALERT_DATASOURCE_USERNAME:postgres} # 👈 테라폼의 alert_history_db_master_username과 일치시킴!
    password: ${ALERT_DB_PASSWORD}         # 👈 ESO가 secrets manager에서 가져와 주입해줄 비밀번호
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    # PostgreSQL 환경에 맞게 하이버네이트 방언 추가 (권장)
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8082

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

  endpoint:
    health:
      probes:
        enabled: true

errorops:
  kubernetes:
    log-tail-lines: 120
    event-limit: 20

  gemini:
    model: ${GEMINI_MODEL:gemini-flash-latest}
    api-key: ${GEMINI_API_KEY:}
    timeout-seconds: ${GEMINI_TIMEOUT_SECONDS:30}
    max-retries: ${GEMINI_MAX_RETRIES:2}                # ← 이 줄 추가
    initial-delay-ms: ${GEMINI_INITIAL_DELAY_MS:1000}   # ← 이 줄 추가

  slack:
    general-webhook-url: ${SLACK_GENERAL_WEBHOOK_URL:}
    critical-webhook-url: ${SLACK_CRITICAL_WEBHOOK_URL:}
    warning-webhook-url: ${SLACK_WARNING_WEBHOOK_URL:}
    info-webhook-url: ${SLACK_INFO_WEBHOOK_URL:}
    codex-queue-webhook-url: ${SLACK_CODEX_QUEUE_WEBHOOK_URL:}
    codex-bot-token: ${SLACK_CODEX_BOT_TOKEN:}
    codex-channel-id: ${SLACK_CODEX_CHANNEL_ID:}

logging:
  level:
    com.team2.talkking.errorops.alert: INFO
    com.team2.talkking.errorops.gemini: INFO                # ← 추가
    org.springframework.web.reactive.function.client: WARN  # ← 추가
    org.springframework.data.redis: WARN
